{% set name = "confection" %}
{% set version = "1.3.3" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/explosion/{{ name }}/archive/refs/tags/release-v{{ version }}.tar.gz
  sha256: c977841f277255b0b59acb5b4e8a2d7d266ee4369278308fc2b820ec314fc5d7

build:
  number: 0
  skip: true  # [py<310]
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - python
    - pip
    - wheel
    - setuptools
  run:
    - python
    - typing_extensions>=4.0,<5.0  # [py<311]

test:
  source_files:
    - tests
  imports:
    - confection
  commands:
    - pip check
    - python -m pytest -v tests
  requires:
    - pip
    - catalogue >=2.0.3,<2.1.0
    - pathy >=0.3.5
    - pytest >=5.2.0,!=7.1.0
    - numpy >=1.15.0
    - hypothesis
    - pydantic >=1.7.4,<3.0.0
    - ruff

about:
  home: https://github.com/explosion/confection
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: The sweetest config system for Python
  description: |
    A lightweight library that offers a configuration system letting you
    conveniently describe arbitrary trees of objects.
  doc_url: https://github.com/explosion/confection/blob/main/README.md
  dev_url: https://github.com/explosion/confection

extra:
  recipe-maintainers:
    - honnibal
    - ines
    - adrianeboyd