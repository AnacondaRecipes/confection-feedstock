{% set name = "confection" %}
{% set version = "0.1.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 8e72dd3ca6bd4f48913cd220f10b8275978e740411654b6e8ca6d7008c590f0e

build:
  number: 0
  skip: true  # [py<36]
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - python
    - pip
    - setuptools
  run:
    - python
    - pydantic >=1.7.4,!=1.8,!=1.8.1,<3.0.0
    - typing_extensions <5.0.0,>=3.7.4.1  # [py<38]
    - srsly >=2.4.0,<3.0.0

test:
  imports:
    - {{ name }}
  requires:
    - catalogue >=2.0.3,<2.1.0
    - pytest >=5.2.0,!=7.1.0
    - numpy
    - pip
  commands:
    - pip check
    - python -m pytest --tb=native --pyargs {{ name }}

about:
  home: https://github.com/explosion/confection
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: The sweetest config system for Python
  description: |
    A lightweight library that offers a configuration system letting you
    conveniently describe arbitrary trees of objects.
  doc_url: https://github.com/explosion/confection
  dev_url: https://github.com/explosion/confection

extra:
  recipe-maintainers:
    - honnibal
    - ines
    - adrianeboyd